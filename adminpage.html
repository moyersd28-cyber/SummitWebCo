<!DOCTYPE html>
<html>
<head>
<title>Summit Web Co Admin</title>

<style>

body{
margin:0;
font-family:Inter, sans-serif;
background:#0f172a;
color:white;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#020617;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:#cbd5e1;
text-decoration:none;
margin:15px 0;
}

.sidebar a:hover{
color:#38bdf8;
}

/* MAIN CONTENT */

.main{
flex:1;
padding:30px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
flex:1;
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
}

.section{
margin-top:30px;
}

.item{
background:#1e293b;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.status{
font-weight:bold;
color:#38bdf8;
}

</style>

</head>
<body>

<div class="sidebar">

<h2>Summit Admin</h2>

<a href="#">Dashboard</a>
<a href="#">Orders</a>
<a href="#">Tickets</a>
<a href="#">Analytics</a>

</div>

<div class="main">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h2 id="ordersCount">0</h2>
Orders
</div>

<div class="card">
<h2 id="ticketsCount">0</h2>
Tickets
</div>

<div class="card">
<h2 id="completedCount">0</h2>
Completed
</div>

</div>


<div class="section">

<h2>Orders</h2>

<div id="orders"></div>

</div>


<div class="section">

<h2>Support Tickets</h2>

<div id="tickets"></div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
deleteDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "YOUR NEW KEY",
authDomain: "summit-web-co.firebaseapp.com",
projectId: "summit-web-co",
storageBucket: "summit-web-co.appspot.com",
messagingSenderId: "532909980411",
appId: "1:532909980411:web:f78f28e2390027b8a38e5e"

};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* ORDERS */

onSnapshot(collection(db,"orders"), snapshot => {

const ordersDiv=document.getElementById("orders");

ordersDiv.innerHTML="";

document.getElementById("ordersCount").innerText=snapshot.size;

let completed=0;

snapshot.forEach(order=>{

const data=order.data();

if(data.status==="Completed"){
completed++;
}

ordersDiv.innerHTML+=`

<div class="item">

<b>Name:</b> ${data.name || ""}<br>
<b>Email:</b> ${data.email || ""}<br>
<b>Service:</b> ${data.service || ""}<br>
<b>Status:</b> <span class="status">${data.status || "Pending"}</span>

<br>

<button onclick="startProject('${order.id}')">Start</button>
<button onclick="completeProject('${order.id}')">Complete</button>
<button onclick="deleteOrder('${order.id}')">Delete</button>

</div>

`;

});

document.getElementById("completedCount").innerText=completed;

});


/* TICKETS */

onSnapshot(collection(db,"tickets"), snapshot => {

const ticketDiv=document.getElementById("tickets");

ticketDiv.innerHTML="";

document.getElementById("ticketsCount").innerText=snapshot.size;

snapshot.forEach(ticket=>{

const data=ticket.data();

ticketDiv.innerHTML+=`

<div class="item">

<b>Name:</b> ${data.name || ""}<br>
<b>Email:</b> ${data.email || ""}<br>
<b>Message:</b> ${data.message || ""}

<br>

<button onclick="resolveTicket('${ticket.id}')">
Resolve
</button>

</div>

`;

});

});


/* FUNCTIONS */

window.deleteOrder = async function(id){

await deleteDoc(doc(db,"orders",id));

}


window.resolveTicket = async function(id){

await deleteDoc(doc(db,"tickets",id));

}


window.startProject = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"In Progress"
});

}


window.completeProject = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"Completed"
});

}

</script>

</div>
</body>
</html>
