<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Summit Web Co | Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

.navbar{
width:100%;
background:#1e293b;
padding:12px;
display:flex;
justify-content:space-between;
position:fixed;
top:0;
}

.navbar a{
color:white;
text-decoration:none;
margin:0 15px;
}

.sidebar{
width:230px;
height:100vh;
background:#1e293b;
position:fixed;
top:50px;
padding-top:20px;
}

.sidebar button{
width:100%;
background:none;
border:none;
color:white;
padding:15px;
text-align:left;
cursor:pointer;
}

.main{
margin-left:230px;
margin-top:60px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin:10px;
display:inline-block;
width:200px;
text-align:center;
}

ul{
list-style:none;
padding:0;
}

li{
background:#1e293b;
padding:10px;
margin:6px 0;
border-radius:6px;
}

.hidden{
display:none;
}

.statusBtn{
margin-top:6px;
padding:6px 10px;
border:none;
border-radius:4px;
cursor:pointer;
background:#2563eb;
color:white;
}

</style>
</head>

<body>

<div class="navbar">

<a href="index.html">Main Site</a>

</div>

<div><strong>Summit Admin</strong></div>
</div>

<div class="sidebar">
<button onclick="view('dashboard')">Dashboard</button>
<button onclick="view('orders')">Orders</button>
<button onclick="view('tickets')">Tickets</button>
<button onclick="view('analytics')">Analytics</button>
</div>

<div class="main">

<div id="dashboard">

<h1>Dashboard</h1>

<div class="card">
Orders<br>
<span id="orderCount">0</span>
</div>

<div class="card">
Tickets<br>
<span id="ticketCount">0</span>
</div>

<div class="card">
Revenue<br>
$<span id="revenue">0</span>
</div>

<div class="card">
Visitors<br>
<span id="visitors">0</span>
</div>

</div>

<div id="orders" class="hidden">
<h2>Orders</h2>
<ul id="orderList"></ul>
</div>

<div id="tickets" class="hidden">
<h2>Tickets</h2>
<ul id="ticketList"></ul>
</div>

<div id="analytics" class="hidden">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>

function view(section){

["dashboard","orders","tickets","analytics"].forEach(id=>{
document.getElementById(id).classList.add("hidden")
})

document.getElementById(section).classList.remove("hidden")

if(section==="analytics") renderChart()

}

</script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
onSnapshot,
doc,
updateDoc,
getDoc,
setDoc,
increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCSBbgbEqdwm4WthtcaeMx54HNvTStsHIg",
authDomain: "summit-web-co.firebaseapp.com",
projectId: "summit-web-co",
storageBucket: "summit-web-co.firebasestorage.app",
messagingSenderId: "532909980411",
appId: "1:532909980411:web:f78f28e2390027b8a38e5e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let revenueTotal = 0

const orderQuery = query(collection(db,"orders"),orderBy("createdAt","desc"))

onSnapshot(orderQuery,(snapshot)=>{

orderList.innerHTML=""
revenueTotal=0

snapshot.forEach(docSnap=>{

const data=docSnap.data()
const id=docSnap.id

revenueTotal+=data.price||0

orderList.innerHTML+=`
<li>
<strong>${data.name||"Customer"}</strong><br>
Package: ${data.package||"Unknown"}<br>
Email: ${data.email||"None"}<br>
Price: $${data.price||0}<br>
Status: ${data.status||"Pending"}<br>

<button class="statusBtn" onclick="updateOrder('${id}','Pending')">Pending</button>
<button class="statusBtn" onclick="updateOrder('${id}','In Progress')">In Progress</button>
<button class="statusBtn" onclick="updateOrder('${id}','Completed')">Completed</button>

</li>
`

})

orderCount.innerText=snapshot.size
revenue.innerText=revenueTotal.toFixed(2)

})

window.updateOrder=async function(id,status){
await updateDoc(doc(db,"orders",id),{status:status})
}

const ticketQuery=query(collection(db,"tickets"),orderBy("createdAt","desc"))

onSnapshot(ticketQuery,(snapshot)=>{

ticketList.innerHTML=""

snapshot.forEach(docSnap=>{

const data=docSnap.data()
const id=docSnap.id

ticketList.innerHTML+=`
<li>
<strong>${data.name||"User"}</strong><br>
${data.description||data.msg||""}<br>
Status: ${data.status||"Open"}<br>

<button class="statusBtn" onclick="updateTicket('${id}','Open')">Open</button>
<button class="statusBtn" onclick="updateTicket('${id}','Working')">Working</button>
<button class="statusBtn" onclick="updateTicket('${id}','Closed')">Closed</button>

</li>
`

})

ticketCount.innerText=snapshot.size

})

window.updateTicket=async function(id,status){
await updateDoc(doc(db,"tickets",id),{status:status})
}

const ref=doc(db,"analytics","visits")
const snap=await getDoc(ref)

if(snap.exists()){
await updateDoc(ref,{count:increment(1)})
visitors.innerText=snap.data().count+1
}else{
await setDoc(ref,{count:1})
visitors.innerText=1
}

}

trackVisit()

window.renderChart=function(){

new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Orders","Tickets","Revenue"],
datasets:[{
data:[
parseInt(orderCount.innerText),
parseInt(ticketCount.innerText),
parseFloat(revenue.innerText)
]
}]
}

})

}

</script>

</body>
</html>
