<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  padding: 1rem;
  background: #020617;
  text-align: center;
  font-weight: 600;
}

.container { padding: 2rem; }

/* LOGIN */
#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #1e293b;
  padding: 2rem;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

input {
  padding: 0.7rem;
  width: 100%;
  margin-bottom: 1rem;
  border-radius: 6px;
  border: none;
}

button {
  padding: 0.6rem 1.2rem;
  background: #38bdf8;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* DASHBOARD */
.dashboard { display: none; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 1.5rem;
}

.card {
  background: #1e293b;
  padding: 1.5rem;
  border-radius: 10px;
}

.item {
  background: #020617;
  padding: 1rem;
  margin-bottom: 1rem;
  border-radius: 6px;
}

.status-new { color: #38bdf8; }
.status-progress { color: #facc15; }
.status-done { color: #22c55e; }

.actions button {
  background: #ef4444;
  margin-top: 0.5rem;
}

.search {
  margin-bottom: 1rem;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>Admin Access</h2>
    <input type="password" id="passcode" placeholder="Enter Passcode">
    <button onclick="login()">Enter</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <header>Summit Web Co. Admin Panel</header>

  <div class="container">
    <div class="grid">

      <!-- ORDERS -->
      <div class="card">
        <h3>Orders</h3>
        <input class="search" id="orderSearch" placeholder="Search orders...">
        <div id="ordersList"></div>
      </div>

      <!-- TICKETS -->
      <div class="card">
        <h3>Tickets</h3>
        <input class="search" id="ticketSearch" placeholder="Search tickets...">
        <div id="ticketsList"></div>
      </div>

      <!-- ANALYTICS -->
      <div class="card">
        <h3>Analytics</h3>
        <p>Total Orders: <span id="orderCount">0</span></p>
        <p>Completed Orders: <span id="completedCount">0</span></p>
        <p>Total Tickets: <span id="ticketCount">0</span></p>
      </div>

    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔐 PASSCODE LOGIN */
const ADMIN_PASSCODE = "ThePeak2026";

window.login = function () {
  const input = document.getElementById("passcode").value;

  if (input === ADMIN_PASSCODE) {
    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    loadOrders();
    loadTickets();
  } else {
    alert("Wrong passcode");
  }
};

document.getElementById("passcode").addEventListener("keypress", e => {
  if (e.key === "Enter") login();
});

/* 📦 LOAD ORDERS */
function loadOrders() {
  const list = document.getElementById("ordersList");
  const search = document.getElementById("orderSearch");

  onSnapshot(collection(db, "orders"), (snapshot) => {
    list.innerHTML = "";

    let completed = 0;
    document.getElementById("orderCount").textContent = snapshot.size;

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const fields = data.fields || {};

      if (data.status === "Completed") completed++;

      if (search.value &&
          !fields["Name"]?.toLowerCase().includes(search.value.toLowerCase()))
        return;

      const statusClass =
        data.status === "Completed" ? "status-done" :
        data.status === "In Progress" ? "status-progress" : "status-new";

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <strong>${fields["Name"] || "No Name"}</strong><br>
        ${fields["Contact Information"] || "No Contact"}<br>
        ${fields["Service"] || "No Service"}<br>
        <span class="${statusClass}">${data.status || "New"}</span><br>

        <select onchange="updateStatus('${docSnap.id}', this.value)">
          <option ${data.status==="New"?"selected":""}>New</option>
          <option ${data.status==="In Progress"?"selected":""}>In Progress</option>
          <option ${data.status==="Completed"?"selected":""}>Completed</option>
        </select>

        <div class="actions">
          <button onclick="deleteOrder('${docSnap.id}')">Delete</button>
        </div>
      `;

      list.appendChild(div);
    });

    document.getElementById("completedCount").textContent = completed;
  });

  search.addEventListener("input", loadOrders);
}

/* 🎫 LOAD TICKETS */
function loadTickets() {
  const list = document.getElementById("ticketsList");
  const search = document.getElementById("ticketSearch");

  onSnapshot(collection(db, "tickets"), (snapshot) => {
    list.innerHTML = "";
    document.getElementById("ticketCount").textContent = snapshot.size;

    snapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const fields = data.fields || {};

      if (search.value &&
          !fields["Name"]?.toLowerCase().includes(search.value.toLowerCase()))
        return;

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <strong>${fields["Name"] || "No Name"}</strong><br>
        ${fields["Contact Information"] || "No Contact"}<br>
        ${data.type || "Ticket"}<br>

        <select onchange="updateTicket('${docSnap.id}', this.value)">
          <option ${data.status==="Open"?"selected":""}>Open</option>
          <option ${data.status==="Resolved"?"selected":""}>Resolved</option>
        </select>

        <div class="actions">
          <button onclick="deleteTicket('${docSnap.id}')">Delete</button>
        </div>
      `;

      list.appendChild(div);
    });
  });

  search.addEventListener("input", loadTickets);
}

/* 🔄 UPDATE */
window.updateStatus = (id, status) =>
  updateDoc(doc(db, "orders", id), { status });

window.updateTicket = (id, status) =>
  updateDoc(doc(db, "tickets", id), { status });

/* ❌ DELETE */
window.deleteOrder = (id) =>
  deleteDoc(doc(db, "orders", id));

window.deleteTicket = (id) =>
  deleteDoc(doc(db, "tickets", id));
</script>

</body>
</html>
