<!DOCTYPE html>
<html>
<head>
<title>Summit Web Co Admin</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:22px;
}

.dashboard{
display:flex;
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
flex:1;
text-align:center;
}

.section{
padding:20px;
}

.item{
background:#1e293b;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
border-radius:6px;
background:#38bdf8;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>
<body>

<header>
Summit Web Co Admin Dashboard
</header>

<div class="dashboard">

<div class="card">
<h2 id="orderCount">0</h2>
Orders
</div>

<div class="card">
<h2 id="ticketCount">0</h2>
Support Tickets
</div>

</div>

<div class="section">

<h2>Orders</h2>
<div id="ordersList"></div>

<h2>Support Tickets</h2>
<div id="ticketsList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


const firebaseConfig = {

apiKey: "YOUR NEW API KEY",
authDomain: "summit-web-co.firebaseapp.com",
projectId: "summit-web-co",
storageBucket: "summit-web-co.firebasestorage.app",
messagingSenderId: "532909980411",
appId: "1:532909980411:web:f78f28e2390027b8a38e5e"

};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* LOAD ORDERS */

onSnapshot(collection(db,"orders"), snapshot => {

const ordersList=document.getElementById("ordersList");

ordersList.innerHTML="";
document.getElementById("orderCount").innerText=snapshot.size;

snapshot.forEach(docItem=>{

const data=docItem.data();

ordersList.innerHTML+=`

<div class="item">

<b>Name:</b> ${data.name || ""}<br>
<b>Email:</b> ${data.email || ""}<br>
<b>Service:</b> ${data.service || ""}<br>
<b>Details:</b> ${data.details || ""}

<br>

<button onclick="deleteOrder('${docItem.id}')">
Delete Order
</button>

</div>

`;

});

});


/* LOAD TICKETS */

onSnapshot(collection(db,"tickets"), snapshot => {

const ticketList=document.getElementById("ticketsList");

ticketList.innerHTML="";
document.getElementById("ticketCount").innerText=snapshot.size;

snapshot.forEach(docItem=>{

const data=docItem.data();

ticketList.innerHTML+=`

<div class="item">

<b>Name:</b> ${data.name || ""}<br>
<b>Email:</b> ${data.email || ""}<br>
<b>Message:</b> ${data.message || ""}

<br>

<button onclick="deleteTicket('${docItem.id}')">
Resolve Ticket
</button>

</div>

`;

});

});


/* DELETE ORDER */

window.deleteOrder = async function(id){

await deleteDoc(doc(db,"orders",id));

}


/* DELETE TICKET */

window.deleteTicket = async function(id){

await deleteDoc(doc(db,"tickets",id));

}

</script>

</body>
</html>
